services:
  postgres:
    image: postgres:16-alpine
    container_name: pm_postgres
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpassword
      POSTGRES_DB: pmdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pmuser:pmpassword@postgres:5432/pmdb
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: node server.js

volumes:
  postgres_data:
